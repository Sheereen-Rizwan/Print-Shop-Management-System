{% extends 'base.html' %}
{% block page_title %}Current Prices{% endblock %}
{% block page_subtitle %}Editable anytime — applies to new charges only{% endblock %}

{% block content %}
<div class="panel" style="max-width: 480px;">
    <form method="POST" action="/prices/update">
        {% for p in prices %}
        <div class="ps-form-group">
            <label>{{ p.item_name }}</label>
            <input type="number" step="0.01" min="0" name="price_{{ p.price_id }}" class="ps-input" value="{{ p.amount }}">
        </div>
        {% endfor %}
        <button type="submit" class="btn btn-primary btn-block">Save Prices</button>
    </form>
</div>
{% endblock %}
