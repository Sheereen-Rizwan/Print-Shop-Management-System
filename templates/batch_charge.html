{% extends 'base.html' %}
{% block page_title %}Batch Charge{% endblock %}
{% block page_subtitle %}Charge an entire batch + stream group at once{% endblock %}

{% block content %}
<div class="panel" style="max-width: 480px;">
    <form method="POST">
        <div class="ps-form-group">
            <label>Batch & Stream *</label>
            <select name="subject_group_id" class="ps-select" required>
                <option value="">-- Select group --</option>
                {% for sg in subject_groups %}
                <option value="{{ sg.subject_group_id }}">
                    {{ sg.batch_name }} — {{ sg.stream_name }}
                    {% if sg.group_name != 'General' %} ({{ sg.group_name }}){% endif %}
                </option>
                {% endfor %}
            </select>
        </div>
        <div class="ps-form-group">
            <label>Description *</label>
            <input type="text" name="description" class="ps-input" placeholder="e.g. Chemistry Note" required>
        </div>
        <div class="ps-form-group">
            <label>Amount per student (Rs.) *</label>
            <input type="number" step="0.01" min="0.01" name="amount" class="ps-input" required>
        </div>
        <button type="submit" class="btn btn-danger btn-block">Apply Charge to Group</button>
    </form>
</div>
{% endblock %}
