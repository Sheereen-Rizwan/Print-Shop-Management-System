{% extends 'base.html' %}
{% block page_title %}Add Charge{% endblock %}
{% block page_subtitle %}{{ student.name }}{% endblock %}

{% block content %}
<div class="panel" style="max-width: 480px;">
    <form method="POST">
        <div class="ps-form-group">
            <label>Description *</label>
            <input type="text" name="description" class="ps-input" placeholder="e.g. Physics Note, Photocopy, Binding" required>
        </div>
        <div class="ps-form-group">
            <label>Amount (Rs.) *</label>
            <input type="number" step="0.01" min="0.01" name="amount" class="ps-input" required>
        </div>
        <button type="submit" class="btn btn-danger btn-block">Add Charge</button>
        <a href="/students/{{ student.student_id }}" class="btn btn-secondary btn-block" style="margin-top:8px;">Cancel</a>
    </form>
</div>
{% endblock %}
